services:
  showalter:
    # Image is published by the org-shared workflow at
    # lxrbckl-dev/.github/.github/workflows/dockerhub-build-push.yml,
    # which tags `<DOCKERHUB_USERNAME>/project-showalter:<branch>` and
    # `:<sha>`. Set DOCKERHUB_USERNAME in the deployment .env; override
    # SHOWALTER_IMAGE_TAG to pin a specific sha (defaults to `main`).
    image: ${DOCKERHUB_USERNAME}/project-showalter:${SHOWALTER_IMAGE_TAG:-main}
    container_name: showalter
    restart: unless-stopped
    ports:
      - "5827:5827"
    volumes:
      - /srv/showalter/data:/data
    environment:
      NODE_ENV: production
      PORT: 5827
      BASE_URL: https://showalter.business
      AUTH_SECRET: ${AUTH_SECRET}
      SEED_FROM_BRIEF: ${SEED_FROM_BRIEF:-false}
      BOOKING_RATE_LIMIT_PER_HOUR: ${BOOKING_RATE_LIMIT_PER_HOUR:-30}
      NEXT_PUBLIC_UMAMI_SRC: ${NEXT_PUBLIC_UMAMI_SRC:-}
      NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${NEXT_PUBLIC_UMAMI_WEBSITE_ID:-}
    networks:
      - showalter-net

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: umami
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: ${UMAMI_DATABASE_URL}
      APP_SECRET: ${UMAMI_APP_SECRET}
    depends_on:
      - umami-db
    networks:
      - showalter-net

  umami-db:
    image: postgres:16-alpine
    container_name: umami-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD}
    volumes:
      - /srv/showalter/umami-db:/var/lib/postgresql/data
    networks:
      - showalter-net

networks:
  showalter-net:
    driver: bridge
