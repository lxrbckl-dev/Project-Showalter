services:
  showalter:
    # Image is published by the org-shared workflow at
    # lxrbckl-dev/.github/.github/workflows/dockerhub-build-push.yml,
    # which tags `lxrbckl/project-showalter:<branch>` and `:<sha>`.
    # Override SHOWALTER_IMAGE_TAG to pin a specific sha (defaults to `main`).
    image: lxrbckl/project-showalter:${SHOWALTER_IMAGE_TAG:-main}
    container_name: showalter
    restart: unless-stopped
    ports:
      - "5827:5827"
    volumes:
      - ./data:/data
    environment:
      NODE_ENV: production
      PORT: 5827
      BASE_URL: ${BASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      SEED_FROM_BRIEF: ${SEED_FROM_BRIEF:-false}
      BOOKING_RATE_LIMIT_PER_HOUR: ${BOOKING_RATE_LIMIT_PER_HOUR:-30}
